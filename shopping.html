<!DOCTYPE html>
<html>
<head>
<title>Zepto Shopping</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}
header{
    background:#0047d4;
    color:white;
    text-align:center;
    padding:15px;
}
.search{
    width:95%;
    margin:15px auto;
    display:block;
    padding:10px;
}
.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}
.card{
    background:white;
    width:180px;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 5px gray;
}
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}
button{
    background:#3366ff;
    color:white;
    border:none;
    padding:8px 12px;
}
footer{
    margin-top:20px;
    background:#0047d4;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<header>
    <h2>Welcome To Zepto Shopping</h2>
</header>

<input type="text" class="search" placeholder="Search products...">

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=300" alt="">
<h3>Apples</h3>
<p>₹120/kg</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1550583724-b2692b85b150?w=300" alt="">
<h3>Milk</h3>
<p>₹50</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=300" alt="">
<h3>Bread</h3>
<p>₹40</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1549007994-cb92caebd54b?w=300" alt="">
<h3>Dairy Milk Silk</h3>
<p>₹350</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1570197788417-0e82375c9371?w=300" alt="">
<h3>Ice Cream</h3>
<p>₹100</p>
<button>Add to Cart</button>
</div>

</div>

<footer>
© 2026 Zepto Shopping. All Rights Reserved.
</footer>

</body>
</html>
