<!DOCTYPE html>
<html>
<head>
<title>Zepto Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(to right,#6a11cb,#b721ff);
}
.login-box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
input{
    width:90%;
    padding:8px;
    margin:8px 0;
}
button{
    width:95%;
    padding:10px;
    background:#1d2671;
    color:white;
    border:none;
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Zepto Login Page</h2>

    <form action="shopping.html">
        <input type="email" placeholder="Enter Email" required><br>
        <input type="password" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p>Enter valid Email and Password</p>
</div>

</body>
</html>
